name: FR-004 cross-platform smoke

# NFR-005 evidence: exercise the FR-004 Core CLI commands on every
# supported platform target (macOS, Linux, native Windows PowerShell,
# WSL). The Linux job runs the full CLI suite; the other targets scope
# to tests/cli/test_fr004_smoke.py to keep matrix wall-time low while
# still proving the FR-004 surface boots on each platform.
#
# Action versions are pinned to specific tags so the matrix stays
# reproducible (NFR-004 determinism intent).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke-macos:
    name: macOS smoke
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: Run FR-004 smoke
        shell: bash
        run: python3 -m unittest discover -s tests -t . -p "test_fr004_smoke.py"

  smoke-linux-full:
    name: Linux full CLI suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: Run full CLI suite
        shell: bash
        run: python3 -m unittest discover -s tests -t .

  smoke-windows-powershell:
    name: Windows native PowerShell smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
      - name: Run FR-004 smoke
        shell: pwsh
        run: python -m unittest discover -s tests -t . -p "test_fr004_smoke.py"

  smoke-wsl:
    name: WSL smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up WSL
        uses: Vampire/setup-wsl@v3.1.3
        with:
          distribution: Ubuntu-22.04
      - name: Install Python 3.11 inside WSL
        shell: wsl-bash {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.11
      - name: Run FR-004 smoke
        shell: wsl-bash {0}
        run: python3.11 -m unittest discover -s tests -t . -p "test_fr004_smoke.py"
